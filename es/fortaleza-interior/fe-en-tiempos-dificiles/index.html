<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Próximamente | PrepperFamily.org</title>
  <meta name="description" content="Esta página de categoría está en construcción. Más guías prácticas para la familia llegarán pronto." />
  <style>
    :root {
      --pf-bg: #f7f4ee;
      --pf-card: #ffffff;
      --pf-text: #1f1f1f;
      --pf-muted: #666;
      --pf-border: rgba(0,0,0,0.08);
      --pf-accent: #6f1d1b;
      --pf-accent-2: #a67c52;
      --pf-shadow: 0 10px 30px rgba(0,0,0,0.08);
      --pf-radius: 18px;
      --pf-max: 1100px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--pf-text);
      background: var(--pf-bg);
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
    }

    .pf-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .pf-main {
      flex: 1;
      padding: 48px 20px 72px;
    }

    .pf-wrap {
      max-width: var(--pf-max);
      margin: 0 auto;
    }

    .pf-coming {
      background: linear-gradient(180deg, #fff 0%, #fcfaf6 100%);
      border: 1px solid var(--pf-border);
      border-radius: var(--pf-radius);
      box-shadow: var(--pf-shadow);
      padding: 56px 28px;
      text-align: center;
    }

    .pf-coming-badge {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(111, 29, 27, 0.08);
      color: var(--pf-accent);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pf-coming h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.1;
      color: var(--pf-accent);
    }

    .pf-coming p {
      max-width: 720px;
      margin: 0 auto;
      font-size: 1.08rem;
      line-height: 1.75;
      color: var(--pf-muted);
    }

    .pf-coming p strong {
      color: var(--pf-text);
    }

    .pf-divider {
      width: 90px;
      height: 3px;
      margin: 26px auto 24px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--pf-accent), var(--pf-accent-2));
    }

    .pf-note {
      margin-top: 28px;
      font-size: 0.96rem;
      color: #7a7a7a;
    }

    @media (max-width: 640px) {
      .pf-main {
        padding: 32px 16px 56px;
      }

      .pf-coming {
        padding: 40px 20px;
      }

      .pf-coming p {
        font-size: 1rem;
      }
    }
      #pf-footer-partial img {
    margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="pf-page">

    <!-- HEADER PARTIAL -->
    <div id="pf-header-partial"></div>

    <!-- SUBMENU PARTIAL -->
    <div id="pf-submenu-partial"></div>

    <main class="pf-main">
      <div class="pf-wrap">
        <section class="pf-coming" aria-label="Mensaje de próximamente">
          <div class="pf-coming-badge">En construcción</div>
          <h1>Próximamente</h1>
          <div class="pf-divider"></div>
          <p>
            Estamos trabajando en <strong>futuras guías para tu familia</strong>.
            Esta categoría todavía se está preparando, pero pronto se publicará
            aquí más contenido práctico.
          </p>
          <p class="pf-note">
            Gracias por tu paciencia mientras PrepperFamily continúa creando recursos útiles y centrados en la familia.
          </p>
        </section>
      </div>
    </main>

    <!-- FOOTER PARTIAL -->
    <div id="pf-footer-partial"></div>

  </div>

  <script>
    async function loadPartial(targetId, url) {
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`Failed to load ${url}`);
        const html = await response.text();
        document.getElementById(targetId).innerHTML = html;
      } catch (error) {
        console.error(error);
      }
    }

    loadPartial("pf-header-partial", "/partials/header-es/");
    loadPartial("pf-submenu-partial", "/partials/submenu/es/fortaleza-interior/");
    loadPartial("pf-footer-partial", "/partials/footer-es/");
  </script>
</body>
</html>
