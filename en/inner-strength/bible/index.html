<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bible | PrepperFamily.org</title>

  <style>
    :root {
      --pf-bg: #f7f4ee;
      --pf-text: #1f1f1f;
      --pf-muted: #666;
      --pf-border: rgba(0,0,0,0.08);
      --pf-accent: #6f1d1b;
      --pf-accent-2: #a67c52;
      --pf-shadow: 0 10px 30px rgba(0,0,0,0.08);
      --pf-shadow-soft: 0 6px 18px rgba(0,0,0,0.05);
      --pf-radius: 18px;
      --pf-max: 1100px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, serif;
      background: var(--pf-bg);
    }

    .pf-main {
      padding: 40px 20px;
    }

    .pf-wrap {
      max-width: var(--pf-max);
      margin: 0 auto;
    }

    .pf-article-card {
      display: block;
      background: linear-gradient(180deg, #fff 0%, #fcfaf6 100%);
      border: 1px solid var(--pf-border);
      border-radius: var(--pf-radius);
      box-shadow: var(--pf-shadow-soft);
      padding: 12px 22px; /* 🔥 RECORTE PRINCIPAL */
      transition: 0.2s;
    }

    .pf-article-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--pf-shadow);
    }

    .pf-article-content {
      display: flex;
      align-items: flex-start; /* 🔥 CLAVE */
      gap: 18px;
    }

    .pf-article-img {
      flex: 0 0 110px;
      height: 150px; /* 🔥 IMAGEN ALTA */
      border-radius: 14px;
      overflow: hidden;
    }

    .pf-article-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .pf-article-top {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pf-article-title {
      font-size: 1.6rem;
      color: var(--pf-accent);
      margin: 0;
    }

    .pf-article-arrow {
      font-size: 1.3rem;
      color: var(--pf-accent);
    }

    @media (max-width: 640px) {
      .pf-article-img {
        flex: 0 0 85px;
        height: 120px;
      }

      .pf-article-card {
        padding: 10px 18px;
      }
    }
  </style>
</head>

<body>

<main class="pf-main">
  <div class="pf-wrap">

    <a class="pf-article-card" href="/en/inner-strength/bible/">

      <div class="pf-article-content">

        <div class="pf-article-img">
          <img src="/assets/images/inner-strength/es/biblia/biblia.jpg">
        </div>

        <div class="pf-article-top">
          <h1 class="pf-article-title">Bible</h1>
          <span class="pf-article-arrow">→</span>
        </div>

      </div>

    </a>

  </div>
</main>

</body>
</html>
