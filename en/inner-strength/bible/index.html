<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bible | PrepperFamily.org</title>
  <meta name="description" content="Practical family guides for Scripture, biblical literacy, and faithful study." />
  <link rel="alternate" hreflang="en" href="https://prepperfamily.org/en/inner-strength/bible/" />
  <link rel="alternate" hreflang="es" href="https://prepperfamily.org/es/fortaleza-interior/biblia/" />
  <link rel="alternate" hreflang="x-default" href="https://prepperfamily.org/en/inner-strength/bible/" />
  <style>
    :root {
      --pf-bg: #f7f4ee;
      --pf-card: #ffffff;
      --pf-text: #1f1f1f;
      --pf-muted: #666;
      --pf-border: rgba(0,0,0,0.08);
      --pf-accent: #6f1d1b;
      --pf-accent-2: #a67c52;
      --pf-shadow: 0 10px 30px rgba(0,0,0,0.08);
      --pf-shadow-soft: 0 6px 18px rgba(0,0,0,0.05);
      --pf-radius: 18px;
      --pf-max: 1100px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--pf-text);
      background: var(--pf-bg);
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .pf-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .pf-main {
      flex: 1;
      padding: 48px 20px 72px;
    }

    .pf-wrap {
      max-width: var(--pf-max);
      margin: 0 auto;
    }

    .pf-articles {
      margin-bottom: 34px;
    }

    .pf-article-card {
      display: block;
      background: linear-gradient(180deg, #fff 0%, #fcfaf6 100%);
      border: 1px solid var(--pf-border);
      border-radius: var(--pf-radius);
      box-shadow: var(--pf-shadow-soft);
      padding: 24px 24px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .pf-article-card:hover,
    .pf-article-card:focus-visible {
      transform: translateY(-2px);
      box-shadow: var(--pf-shadow);
      border-color: rgba(111, 29, 27, 0.18);
      outline: none;
    }

    .pf-article-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .pf-article-title {
      margin: 0;
      font-size: clamp(1.3rem, 2.3vw, 1.8rem);
      line-height: 1.2;
      color: var(--pf-accent);
    }

    .pf-article-arrow {
      flex: 0 0 auto;
      font-size: 1.35rem;
      color: var(--pf-accent);
      line-height: 1;
    }

    .pf-coming {
      background: linear-gradient(180deg, #fff 0%, #fcfaf6 100%);
      border: 1px solid var(--pf-border);
      border-radius: var(--pf-radius);
      box-shadow: var(--pf-shadow);
      padding: 42px 28px;
      text-align: center;
    }

    .pf-coming-badge {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(111, 29, 27, 0.08);
      color: var(--pf-accent);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .pf-coming h2 {
      margin: 0 0 16px;
      font-size: clamp(1.7rem, 3vw, 2.4rem);
      line-height: 1.1;
      color: var(--pf-accent);
    }

    .pf-coming p {
      max-width: 720px;
      margin: 0 auto;
      font-size: 1.02rem;
      line-height: 1.75;
      color: var(--pf-muted);
    }

    .pf-coming p strong {
      color: var(--pf-text);
    }

    .pf-divider {
      width: 90px;
      height: 3px;
      margin: 22px auto 20px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--pf-accent), var(--pf-accent-2));
    }

    .pf-note {
      margin-top: 22px;
      font-size: 0.96rem;
      color: #7a7a7a;
    }

    @media (max-width: 640px) {
      .pf-main {
        padding: 32px 16px 56px;
      }

      .pf-article-card {
        padding: 20px 18px;
      }

      .pf-coming {
        padding: 34px 20px;
      }

      .pf-coming p {
        font-size: 1rem;
      }

      .pf-article-top {
        gap: 12px;
      }

      .pf-article-arrow {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="pf-page">

    <!-- HEADER PARTIAL -->
    <div id="pf-header-partial"></div>

    <!-- SUBMENU PARTIAL -->
    <div id="pf-submenu-partial"></div>

    <main class="pf-main">
      <div class="pf-wrap">

        <section class="pf-articles" aria-label="Articles in this category">
          <a class="pf-article-card" href="/en/inner-strength/bible/">
            <div class="pf-article-top">
              <h1 class="pf-article-title">Bible</h1>
              <span class="pf-article-arrow" aria-hidden="true">→</span>
            </div>
          </a>
        </section>

        <section class="pf-coming" aria-label="Coming soon message">
          <div class="pf-coming-badge">Under Construction</div>
          <h2>More Articles Are Coming</h2>
          <div class="pf-divider"></div>
          <p>
            This category is still being expanded. More practical guides will be published here soon.
          </p>
          <p class="pf-note">
            Thank you for your patience while PrepperFamily continues building useful, family-centered resources.
          </p>
        </section>

      </div>
    </main>

  </div>

  <script>
    function normalizePath(path) {
      return (path || '')
        .toLowerCase()
        .replace(/index\.html$/, '')
        .replace(/\/+$/, '') + '/';
    }

    function activateSubmenu(root) {
      if (!root) return;

      var current = normalizePath(window.location.pathname);
      var tabs = root.querySelectorAll('.sub-tab');
      var best = null;
      var bestLen = 0;

      tabs.forEach(function (tab) {
        tab.classList.remove('is-active');
        tab.removeAttribute('aria-current');

        var dp = normalizePath(tab.getAttribute('data-path'));
        if (current.indexOf(dp) === 0 && dp.length > bestLen) {
          best = tab;
          bestLen = dp.length;
        }
      });

      if (best) {
        best.classList.add('is-active');
        best.setAttribute('aria-current', 'page');

        setTimeout(function () {
          best.scrollIntoView({
            behavior: 'auto',
            block: 'nearest',
            inline: 'center'
          });
        }, 30);
      }
    }

    async function loadPartial(targetId, url) {
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`Failed to load ${url}`);
        const html = await response.text();

        const target = document.getElementById(targetId);
        target.innerHTML = html;

        if (targetId === "pf-submenu-partial") {
          const nav = target.querySelector('#pf-sub');
          activateSubmenu(nav);
        }
      } catch (error) {
        console.error(error);
      }
    }

    loadPartial("pf-header-partial", "/partials/header-en/");
    loadPartial("pf-submenu-partial", "/partials/submenu/en/inner-strength/");
  </script>
</body>
</html>
