<header class="pf-header">
  <style>
  :root{
    --pf-bg:#ffffff;
    --pf-text:#0f172a;
    --pf-muted:#334155;
    --pf-green:#1f6b3a;
    --pf-border:#e5e7eb;
  }
  .pf-header{
    position:sticky; top:0; z-index:999;
    background:var(--pf-bg);
    border-bottom:1px solid var(--pf-border);
  }
  .pf-header__inner{
    max-width:1200px; margin:0 auto;
    padding:10px 14px;
    display:flex; align-items:center; gap:14px;
  }
  .pf-brand{
    display:flex; align-items:center; gap:10px;
    text-decoration:none;
    min-width: 220px;
  }
  .pf-brand img{ width:68px; height:68px; object-fit:contain; }
  .pf-brand__text{
    display:flex; flex-direction:column; line-height:1.05;
  }
  .pf-brand__text strong{
    font-size:14px; color:var(--pf-text);
    letter-spacing:.2px;
  }
  .pf-brand__text span{
    font-size:12px; color:var(--pf-muted);
  }
  .pf-nav{
    margin-left:auto;
    display:flex; align-items:center; gap:14px;
    flex-wrap:wrap;
  }
  .pf-nav a{
    text-decoration:none;
    color:var(--pf-text);
    font-weight:700;
    font-size:13px;
    padding:8px 10px;
    border-radius:10px;
  }
  .pf-nav a:hover{ background:#f1f5f9; }
  .pf-actions{
    display:flex; align-items:center; gap:10px;
    margin-left: 10px;
  }
  .pf-btn{
    display:inline-flex; align-items:center; gap:8px;
    border:1px solid var(--pf-border);
    background:#fff;
    color:var(--pf-text);
    border-radius:12px;
    padding:8px 10px;
    font-weight:800;
    font-size:13px;
    cursor:pointer;
    text-decoration:none;
    white-space:nowrap;
  }
  .pf-btn--primary{
    border-color: transparent;
    background: var(--pf-green);
    color:#fff;
  }
  .pf-icon{
    width:16px; height:16px; display:inline-block;
  }
  .pf-hamb{ display:none; }

  /* Mobile menu */
  .pf-mobile{
    display:none;
    border-top:1px solid var(--pf-border);
    max-width:1200px; margin:0 auto;
    padding: 10px 14px 14px;
  }
  .pf-mobile a{
    display:block;
    padding:12px 10px;
    border-radius:12px;
    text-decoration:none;
    color:var(--pf-text);
    font-weight:800;
    margin-top:8px;
    background:#f8fafc;
  }
  .pf-mobile a:hover{ background:#f1f5f9; }

  @media (max-width: 980px){
    .pf-nav{ display:none; }
    .pf-hamb{ display:inline-flex; }
  }
</style>

  <div class="pf-header__inner">
    <a class="pf-brand" href="/es/">
      <img src="https://prepperfamily.org/imagenes/logotipo" alt="Logotipo de PrepperFamily" loading="lazy">
      <div class="pf-brand__text">
        <strong>PrepperFamily.org</strong>
        <span>Preparación familiar &amp; fe</span>
      </div>
    </a>

    <nav class="pf-nav" aria-label="Principal">
      <a href="/blog/sustento-material/">Sustento Material</a>
      <a href="/blog/resistencia-familiar/">Resistencia Familiar</a>
      <a href="/blog/fortaleza-interior/">Fortaleza Interior</a>
      <a href="#comunidad">Comunidad</a>
      <a class="pf-btn" href="mailto:accounting@prepperfamily.org">
        <svg class="pf-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 6.5h16v11H4v-11Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="m4.5 7 7.5 6 7.5-6" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <span>Contacto</span>
      </a>
    </nav>

    <div class="pf-actions">
      <button class="pf-btn pf-btn--primary" data-lang-link="/en/" aria-label="Switch to English">English</button>
      <button class="pf-btn pf-hamb" data-pf-toggle="menu" aria-label="Menú" aria-expanded="false">≡</button>
    </div>
  </div>

  <div class="pf-mobile" data-pf-panel="menu">
    <a href="/blog/sustento-material/">Sustento Material</a>
    <a href="/blog/resistencia-familiar/">Resistencia Familiar</a>
    <a href="/blog/fortaleza-interior/">Fortaleza Interior</a>
    <a href="#comunidad">Comunidad</a>
    <a href="mailto:accounting@prepperfamily.org">Contacto</a>
    <a data-lang-link="/en/" href="#" style="text-align:center; font-weight:900;">English</a>
  </div>

  <script>
(function(){
  var root = document.currentScript && document.currentScript.closest(".pf-header");
  if(!root) return;

  // Language switch (buttons/links with data-lang-link)
  var langTargets = root.querySelectorAll("[data-lang-link]");
  if(langTargets && langTargets.length){
    langTargets.forEach(function(el){
      el.addEventListener("click", function(e){
        e.preventDefault();
        var to = el.getAttribute("data-lang-link");
        if(to) window.location.href = to;
      });
    });
  }

  // Mobile menu toggle
  var btn = root.querySelector("[data-pf-toggle='menu']");
  var panel = root.querySelector("[data-pf-panel='menu']");
  if(!btn || !panel) return;

  btn.addEventListener("click", function(){
    var open = panel.style.display === "block";
    panel.style.display = open ? "none" : "block";
    btn.setAttribute("aria-expanded", open ? "false" : "true");
  });
})();
</script>
</header>
