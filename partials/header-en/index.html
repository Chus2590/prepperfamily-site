<header class="pf-header">
  <style>
  :root{
    --pf-green:#1f6b3a;
    --pf-green-dark:#14512b;
    --pf-bg:#ffffff;
    --pf-text:#0f172a;
    --pf-muted:#334155;
    --pf-border:#e5e7eb;
    --pf-shadow:0 10px 25px rgba(0,0,0,.08);
  }
  .pf-header{
    position:sticky; top:0; z-index:999;
    background:rgba(255,255,255,.92);
    backdrop-filter:saturate(180%) blur(10px);
    border-bottom:1px solid var(--pf-border);
  }
  .pf-header__inner{
    max-width:1200px; margin:0 auto;
    padding:10px 14px;
    display:flex; align-items:center; gap:14px;
  }
  .pf-brand{display:flex; align-items:center; gap:10px; text-decoration:none;}
  .pf-brand img{ width:42px; height:42px; object-fit:contain; }
  .pf-brand__logo{
    width:34px; height:34px; border-radius:10px;
    display:grid; place-items:center;
    background:linear-gradient(135deg,var(--pf-green) 0%, #2e8b57 100%);
    color:#fff; font-weight:900;
    box-shadow:var(--pf-shadow);
    flex:0 0 auto;
  }
  .pf-brand__text{display:flex; flex-direction:column; line-height:1.05;}
  .pf-brand__text strong{font-size:16px; color:var(--pf-text); letter-spacing:.2px;}
  .pf-brand__text span{font-size:12px; color:var(--pf-muted);}
  .pf-nav{margin-left:auto; display:flex; align-items:center; gap:12px;}
  .pf-nav a{
    text-decoration:none; color:var(--pf-text);
    font-weight:700; font-size:13px;
    padding:8px 10px; border-radius:999px;
  }
  .pf-nav a:hover{background:#f1f5f9;}
  .pf-actions{display:flex; align-items:center; gap:10px;}
  .pf-btn{
    border:0; border-radius:999px;
    padding:8px 12px;
    font-weight:800; font-size:13px;
    cursor:pointer;
  }
  .pf-btn--lang{
    background:linear-gradient(135deg,var(--pf-green) 0%, #2e8b57 100%);
    color:#fff;
    box-shadow:var(--pf-shadow);
  }
  .pf-btn--icon{
    background:#f1f5f9; color:var(--pf-text);
    width:38px; height:38px; padding:0;
    display:grid; place-items:center;
  }
  .pf-hamb{display:none;}
  .pf-mobile{
    display:none;
    padding:10px 14px 14px;
    border-top:1px solid var(--pf-border);
    max-width:1200px; margin:0 auto;
  }
  .pf-mobile a{
    display:block;
    padding:12px 10px;
    border-radius:12px;
    text-decoration:none;
    color:var(--pf-text);
    font-weight:800;
    margin-top:8px;
    background:#f8fafc;
  }
  .pf-mobile a:hover{background:#f1f5f9;}
  .pf-mobile .pf-mobile__row{
    display:flex; gap:10px; margin-top:10px;
  }
  .pf-mobile .pf-mobile__row button{flex:1;}
  @media (max-width: 900px){
    .pf-nav{display:none;}
    .pf-hamb{display:grid;}
  }
</style>
  <div class="pf-header__inner">
    <a class="pf-brand" href="/prepperfamily-site/">
      <img src="https://prepperfamily.org/imagenes/logotipo" alt="PrepperFamily logo" loading="lazy">
      <div class="pf-brand__text">
        <strong>PrepperFamily.org</strong>
        <span>Family preparedness &amp; faith</span>
      </div>
    </a>

    <nav class="pf-nav" aria-label="Primary">
      <a href="/en/material-support/">Material Support</a>
      <a href="/en/family-resilience/">Family Resilience</a>
      <a href="/en/inner-strength/">Inner Strength</a>
      <a href="#community">Community</a>
      <a class="pf-btn" href="mailto:accounting@prepperfamily.org"><svg class="pf-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
<path d="M4 6.5h16v11H4v-11Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
<path d="m4.5 7 7.5 6 7.5-6" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
</svg><span>Contact</span></a>
    </nav>

    <div class="pf-actions">
      <button class="pf-btn pf-btn--lang" data-lang-link="/es/" aria-label="Cambiar a Español">Español</button>
      <button class="pf-btn pf-btn--icon pf-hamb" data-pf-toggle="menu" aria-label="Menu" aria-expanded="false">≡</button>
    </div>
  </div>

  <div class="pf-mobile" data-pf-panel="menu">
    <a href="/en/material-support/">Material Support</a>
    <a href="/en/family-resilience/">Family Resilience</a>
    <a href="/en/inner-strength/">Inner Strength</a>
    <div class="pf-mobile__row">
      <button class="pf-btn pf-btn--lang" data-lang-link="/es/" aria-label="Cambiar a Español">Español</button>
      <button class="pf-btn pf-btn--icon" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Top">↑</button>
    </div>
  </div>

  <script>
(function(){
  var root = document.currentScript && document.currentScript.closest(".pf-header");
  if(!root) return;
  var btn = root.querySelector("[data-pf-toggle='menu']");
  var panel = root.querySelector("[data-pf-panel='menu']");
  if(!btn || !panel) return;
  btn.addEventListener("click", function(){
    var open = panel.style.display === "block";
    panel.style.display = open ? "none" : "block";
    btn.setAttribute("aria-expanded", open ? "false" : "true");
  });
})();
</script>
</header>
