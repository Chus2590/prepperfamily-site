<header class="site-header">

<style>

.site-header{
  background:#ffffff;
  border-bottom:1px solid #e6e6e6;
  position:sticky;
  top:0;
  z-index:1000;
  font-family:system-ui, Arial, sans-serif;
}

.header-container{
  max-width:1200px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 20px;
}

.logo img{
  height:52px;
}

.nav{
  display:flex;
  gap:26px;
}

.nav a{
  text-decoration:none;
  color:#222;
  font-size:16px;
  font-weight:500;
}

.nav a:hover{
  color:#2c7be5;
}

.lang{
  font-weight:600;
}

/* MOBILE */

.menu-toggle{
  display:none;
  font-size:26px;
  cursor:pointer;
}

@media (max-width:768px){

.nav{
  position:absolute;
  top:70px;
  left:0;
  width:100%;
  background:white;
  flex-direction:column;
  align-items:center;
  gap:18px;
  padding:20px 0;
  border-bottom:1px solid #eee;
  display:none;
}

.nav.active{
  display:flex;
}

.menu-toggle{
  display:block;
}

}

</style>

<div class="header-container">

<div class="logo">
<a href="/en/">
<img src="https://prepperfamily.org/imagenes/logotipo" alt="PrepperFamily">
</a>
</div>

<div class="menu-toggle" onclick="toggleMenu()">
☰
</div>

<nav class="nav" id="navMenu">

<a href="/en/material-support/">Material Support</a>

<a href="/en/family-resilience/">Family Resilience</a>

<a href="/en/inner-strength/">Inner Strength</a>

<a href="/es/" class="lang">Español</a>

</nav>

</div>

<script>

function toggleMenu(){
  var menu=document.getElementById("navMenu");
  menu.classList.toggle("active");
}

</script>

</header>
