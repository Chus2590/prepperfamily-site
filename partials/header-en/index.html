<header class="site-header">

<style>

.site-header{
background:#fff;
border-bottom:1px solid #e6e6e6;
position:sticky;
top:0;
z-index:1000;
font-family:system-ui,Arial,sans-serif;
}

.header-container{
max-width:1200px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 20px;
gap:20px;
position:relative;
}

.logo{
flex:0 0 auto;
}

.logo img{
height:52px;
display:block;
}

/* NAV */

.nav{
display:flex;
gap:26px;
align-items:center;
margin-left:auto;
}

.nav a{
text-decoration:none;
color:#222;
font-size:16px;
font-weight:500;
line-height:1.2;
display:inline-flex;
align-items:center;
}

.nav a:hover{
color:#2c7be5;
}

.home-link,
.lang{
font-weight:600;
}

/* MOBILE TOGGLE */

.menu-toggle{
display:none;
}

.menu-icon{
display:none;
font-size:32px;
line-height:1;
cursor:pointer;
padding:8px 10px;
user-select:none;
color:#111;
}

/* MOBILE */

@media (max-width:768px){

.header-container{
padding:12px 16px;
align-items:center;
}

.logo img{
height:50px;
}

.menu-icon{
display:block;
margin-left:auto;
}

.nav{
position:absolute;
top:100%;
left:0;
right:0;
background:#fff;
flex-direction:column;
align-items:stretch;
gap:0;
padding:10px 0 14px;
border-top:1px solid #eee;
border-bottom:1px solid #eee;
box-shadow:0 12px 24px rgba(0,0,0,0.06);
display:none;
margin-left:0;
}

.menu-toggle:checked + .menu-icon + .nav{
display:flex;
}

.nav a{
display:block;
padding:14px 22px;
font-size:18px;
font-weight:600;
color:#222;
text-decoration:none;
border-top:1px solid #f2f2f2;
}

.nav a:first-child{
border-top:none;
}

.nav a:hover{
color:#2c7be5;
}

.lang{
margin-left:0;
}

}

</style>

<div class="header-container">

<div class="logo">
<a href="/">
<img src="/assets/images/header/logo.jpg" alt="PrepperFamily">
</a>
</div>

<input type="checkbox" id="menu-toggle" class="menu-toggle">

<label for="menu-toggle" class="menu-icon" aria-label="Open menu">
☰
</label>

<nav class="nav">
<a href="/" class="home-link">Home</a>
<a href="/en/material-support/">Material Support</a>
<a href="/en/family-resilience/">Family Resilience</a>
<a href="/en/inner-strength/">Inner Strength</a>
<a href="/#community">Community</a>
<a href="/es/" class="lang">Español</a>
</nav>

</div>

</header>
