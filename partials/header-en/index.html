<header class="site-header">

<style>

.site-header{
background:#fff;
border-bottom:1px solid #e6e6e6;
position:sticky;
top:0;
z-index:1000;
font-family:system-ui,Arial,sans-serif;
}

.header-container{
max-width:1200px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px 20px;
gap:20px;
position:relative;
}

.logo{
flex:0 0 auto;
}

.logo img{
height:52px;
display:block;
}

/* NAV */

.nav{
display:flex;
gap:26px;
align-items:center;
margin-left:auto;
}

.nav-item{
position:relative;
}

.nav-link,
.nav a{
text-decoration:none;
color:#222;
font-size:16px;
font-weight:500;
line-height:1.2;
display:inline-flex;
align-items:center;
gap:6px;
}

.nav-link:hover,
.nav a:hover{
color:#2c7be5;
}

.has-dropdown > .nav-link::after{
content:"▾";
font-size:12px;
line-height:1;
transform:translateY(1px);
}

/* ACTIVE / EMPHASIS */

.home-link,
.lang{
font-weight:600;
}

/* MEGA MENU */

.mega-menu{
position:absolute;
top:40px;
left:0;
background:#fff;
border:1px solid #eee;
padding:14px 18px;
display:none;
width:260px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
border-radius:8px;
}

.nav-item:hover .mega-menu,
.nav-item:focus-within .mega-menu{
display:block;
}

.mega-menu a{
display:block;
padding:8px 0;
font-size:15px;
font-weight:500;
color:#333;
}

.mega-menu a:hover{
color:#2c7be5;
}

/* LANGUAGE */

.lang{
margin-left:4px;
}

/* MOBILE TOGGLES */

.menu-toggle,
.submenu-toggle{
display:none;
}

.menu-icon{
display:none;
font-size:32px;
line-height:1;
cursor:pointer;
padding:8px 10px;
user-select:none;
color:#111;
}

.mobile-only{
display:none;
}

/* MOBILE */

@media (max-width:768px){

.header-container{
padding:12px 16px;
align-items:center;
}

.logo img{
height:50px;
}

.menu-icon{
display:block;
margin-left:auto;
}

.nav{
position:absolute;
top:100%;
left:0;
right:0;
background:#fff;
flex-direction:column;
align-items:stretch;
gap:0;
padding:10px 0 14px;
border-top:1px solid #eee;
border-bottom:1px solid #eee;
box-shadow:0 12px 24px rgba(0,0,0,0.06);
display:none;
margin-left:0;
}

.menu-toggle:checked + .menu-icon + .nav{
display:flex;
}

.mobile-only{
display:block;
}

.desktop-only{
display:none !important;
}

.nav > a,
.nav > .nav-item > .nav-link,
.nav > .nav-item > .submenu-label{
display:block;
padding:14px 22px;
font-size:18px;
font-weight:600;
color:#222;
text-decoration:none;
}

.nav > a:hover,
.nav > .nav-item > .nav-link:hover,
.nav > .nav-item > .submenu-label:hover{
color:#2c7be5;
}

.nav-item{
width:100%;
border-top:1px solid #f2f2f2;
}

.nav-item:first-of-type{
border-top:none;
}

.has-dropdown > .nav-link{
display:none;
}

.submenu-label{
display:flex;
align-items:center;
justify-content:space-between;
cursor:pointer;
}

.submenu-label::after{
content:"+";
font-size:24px;
font-weight:400;
line-height:1;
}

.submenu-toggle:checked + .submenu-label::after{
content:"–";
}

.mega-menu{
position:static;
display:none;
width:auto;
box-shadow:none;
border:none;
border-left:2px solid #efefef;
border-radius:0;
padding:0 0 6px 0;
margin:0 22px 8px 22px;
background:transparent;
}

.submenu-toggle:checked + .submenu-label + .mega-menu{
display:block;
}

.mega-menu a{
padding:10px 0 10px 14px;
font-size:16px;
font-weight:500;
color:#444;
}

.lang{
margin-left:0;
}

}

</style>
